name = "flowforge-studio"
main = ".open-next/worker.js"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "STUDIO_DB"
database_name = "webflow_studio"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "STUDIO_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "STUDIO_ASSETS"
bucket_name = "webflow-studio-assets"

[[queues.producers]]
binding = "STUDIO_PUBLISH_QUEUE"
queue = "webflow-studio-publish"

# Durable Objects can be enabled after defining class implementation
# in your Cloudflare worker extension module.
# [[durable_objects.bindings]]
# name = "STUDIO_COLLAB_DO"
# class_name = "StudioCollabRoom"
